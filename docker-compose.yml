version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: arbitr_db
    restart: always
    environment:
      POSTGRES_DB: arbitr_subscribe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: arbitr_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes

  bot:
    build: .
    container_name: arbitr_bot
    restart: always
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./:/app

volumes:
  postgres_data:
